<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지 연습</title>
    <link rel="stylesheet" href="css/join.css" />
  </head>
  <body>
    <!-- 전체 로그인 박스 -->
    <div class="login_box">
      <!-- 로고 -->
       <img class="riot" src="/images/riot.png" alt="라이엇 로고">
      <!-- 제목 -->
      <h2>로그인</h2>
      <!-- 로그인 폼 -->
      <form class="form_wrap">
        <!-- 아이디 입력창 -->
        <input type="text" placeholder="계정이름" />
        <!-- 비밀번호 입력창 -->
        <input type="text" placeholder="비밀번호" />
      </form>
      <!-- 소셜계정 연결 버튼 -->
      <div class="icon_wrap">
        <button class="blue">FB</button>
        <button class="white">GG</button>
        <button class="black">AP</button>
        <button class="green">XB</button>
        <button class="navy">PS</button>
      </div>
      <!-- 버튼(로그인상태유지) -->
      <div class="keep">
        <input type="checkbox" >
        <!-- 로그인 상태 유지 메세지 -->
        <p>로그인 상태 유지</p>
      </div>
      <!-- 로그인 버튼 (화살표) -->
      <button class="right">➜</button>
      <div class="last">
        <!-- 계정 찾기 -->
        <p class="forgot">로그인이 안 되시나요?</p>
        <!-- 계정생성 -->
        <p class="join">계정 생성</p>
      </div>
    </div>
  </body>
</html>
